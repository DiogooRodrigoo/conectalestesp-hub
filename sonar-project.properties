sonar.projectKey=conecta-leste-hub
sonar.projectName=Conecta Leste SP - Hub
sonar.projectVersion=1.0

# Source directories (adjust as the project grows)
sonar.sources=app,components,lib
sonar.tests=tests

# Exclude generated, compiled and third-party files
sonar.exclusions=node_modules/**,.next/**,public/**,coverage/**,**/*.config.*,**/*.d.ts

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# Coverage report generated by Vitest (vitest run --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Block the CI pipeline if the Quality Gate fails
sonar.qualitygate.wait=true
